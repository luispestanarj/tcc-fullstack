services:
  postgres:
    image: postgres:16-alpine
    container_name: tcc_postgres
    environment:
      POSTGRES_USER: tcc_user
      POSTGRES_PASSWORD: tcc_password
      POSTGRES_DB: tcc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tcc_user -d tcc_db']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tcc_api
    environment:
      DATABASE_URL: postgresql://tcc_user:tcc_password@postgres:5432/tcc_db
      JWT_SECRET: tcc-jwt-secret-super-seguro-2026
      JWT_EXPIRES_IN: 7d
      PORT: 3333
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: tcc_web
    ports:
      - '8080:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
